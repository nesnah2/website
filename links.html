<!DOCTYPE html>

            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
        }
        
        .link-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-color: #059669;
        }
        
        .link-item.primary {
            background: #059669;

        }
        
        .link-item.youtube {

        .link-item.youtube:hover {

        }
        
        .link-item.instagram:hover {
            opacity: 0.9;
        }
        
        .link-icon {
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
        
        .footer {
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .profile h1 {
