<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Recipe Generator | Mikkel Hansen</title>
    <meta name="description" content="Generate authentic LEGO-style building instructions for any build idea. Candy machine, house, car, and more.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        
        .logo {
            font-size: 0.8rem;
            font-weight: 700;
            color: #e3000b;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: #111;
        }
        
        .subhead {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid #ddd;
            border-radius: 4px;
            background: #fff;
            color: #333;
            outline: none;
        }
        
        .input-row input:focus {
            border-color: #e3000b;
        }
        
        .btn {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #e3000b;
            color: #fff;
        }
        
        .btn:hover { background: #c40009; }
        
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 32px;
        }
        
        .suggestions span { font-size: 0.8rem; color: #888; margin-right: 4px; }
        .suggestions button {
            padding: 6px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            color: #666;
            cursor: pointer;
        }
        .suggestions button:hover {
            border-color: #e3000b;
            color: #e3000b;
        }
        
        .recipe {
            display: none;
            background: #fff;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-top: 0;
        }
        .recipe.visible { display: block; }
        
        .recipe-header {
            background: #e3000b;
            padding: 20px;
            text-align: center;
        }
        .recipe-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0 0 4px 0;
            color: #fff;
        }
        .recipe-header .set-num {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.95);
        }
        
        .recipe-body { padding: 24px; }
        
        .parts-section { margin-bottom: 24px; }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #e3000b;
            margin-bottom: 12px;
        }
        .parts-list { display: grid; gap: 6px; }
        .part-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            background: #f9f9f9;
            border-radius: 2px;
            font-size: 0.9rem;
        }
        .part-id { font-weight: 700; color: #e3000b; min-width: 44px; }
        .part-name { flex: 1; color: #333; }
        .part-qty { font-weight: 600; color: #111; }
        .part-color { font-size: 0.8rem; color: #888; }
        
        .step-view { margin-bottom: 24px; }
        .step-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 2px solid #e3000b;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .step-nav-left { display: flex; align-items: center; gap: 10px; }
        
        .step-nav-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: 2px solid #e3000b;
            border-radius: 2px;
            background: #fff;
            color: #e3000b;
            cursor: pointer;
        }
        .step-nav-btn:hover:not(:disabled) {
            background: #e3000b;
            color: #fff;
        }
        .step-nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .step-indicator {
            font-size: 0.9rem;
            font-weight: 700;
            color: #e3000b;
        }
        
        .play-build-btn {
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            border: 2px solid #e3000b;
            border-radius: 2px;
            background: #fff;
            color: #e3000b;
            cursor: pointer;
        }
        .play-build-btn:hover:not(:disabled) {
            background: #e3000b;
            color: #fff;
        }
        .play-build-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .build-preview {
            background: #f0f0f0;
            padding: 32px 24px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .bricks-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: flex-end;
            justify-content: center;
        }
        .bricks-container.many-bricks { transform: scale(0.75); transform-origin: center; }
        
        .brick {
            position: relative;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .brick.animating {
            animation: legoPlace 0.25s ease-out forwards;
        }
        .brick.appear {
            animation: legoPlace 0.2s ease-out backwards;
        }
        .brick.appear:nth-child(1) { animation-delay: 0.02s; }
        .brick.appear:nth-child(2) { animation-delay: 0.04s; }
        .brick.appear:nth-child(3) { animation-delay: 0.06s; }
        .brick.appear:nth-child(4) { animation-delay: 0.08s; }
        .brick.appear:nth-child(5) { animation-delay: 0.1s; }
        .brick.appear:nth-child(6) { animation-delay: 0.12s; }
        .brick.appear:nth-child(7) { animation-delay: 0.14s; }
        .brick.appear:nth-child(8) { animation-delay: 0.16s; }
        .brick.appear:nth-child(9) { animation-delay: 0.18s; }
        .brick.appear:nth-child(10) { animation-delay: 0.2s; }
        .brick.appear:nth-child(n+11) { animation-delay: 0.22s; }
        
        @keyframes legoPlace {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .brick .studs {
            position: absolute;
            top: 1px; left: 1px; right: 1px; bottom: 1px;
            display: grid;
            gap: 1px;
            padding: 1px;
            pointer-events: none;
        }
        .brick .stud {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
        }
        
        .brick-2x4 { width: 40px; height: 20px; }
        .brick-2x4 .studs { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
        .brick-2x3 { width: 30px; height: 20px; }
        .brick-2x3 .studs { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .brick-2x2 { width: 20px; height: 20px; }
        .brick-2x2 .studs { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .brick-1x4 { width: 20px; height: 10px; }
        .brick-1x4 .studs { grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr; }
        .brick-1x2 { width: 10px; height: 10px; }
        .brick-1x2 .studs { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .brick-1x1 { width: 10px; height: 10px; }
        .brick-1x1 .studs { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .brick-slope { width: 40px; height: 20px; border-radius: 2px 2px 0 0; }
        .brick-slope .studs { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
        .brick-round { width: 10px; height: 10px; border-radius: 50%; }
        .brick-round .studs { display: none; }
        .brick-cylinder { width: 20px; height: 20px; border-radius: 50%; }
        .brick-cylinder .studs { display: none; }
        
        .brick-red { background: #e3000b; }
        .brick-yellow { background: #ffd500; }
        .brick-blue { background: #0055bf; }
        .brick-gray { background: #9ca3af; }
        .brick-white { background: #f4f4f4; }
        .brick-black { background: #1b2a34; }
        .brick-trans { background: rgba(172,215,255,0.7); }
        
        .step-num {
            font-size: 0.8rem;
            font-weight: 700;
            color: #e3000b;
            margin-bottom: 6px;
        }
        .step-parts { font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        .step-text { font-size: 0.95rem; line-height: 1.5; color: #333; }
        
        .build-complete {
            text-align: center;
            padding: 20px;
            font-weight: 700;
            color: #e3000b;
            font-size: 1rem;
        }
        .no-match { font-size: 0.85rem; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="logo">LEGO® Recipe Generator</div>
        <h1>Build anything</h1>
        <p class="subhead">Get authentic LEGO-style instructions with parts list and step-by-step assembly. Type what you want to build below.</p>
        
        <div class="input-row">
            <input type="text" id="buildInput" placeholder="e.g. candy machine, house, car" autofocus>
            <button class="btn" id="buildBtn">Build</button>
        </div>
        
        <div class="suggestions">
            <span>Try:</span>
            <button data-build="candy machine">Candy Machine</button>
            <button data-build="house">House</button>
            <button data-build="car">Car</button>
        </div>
        
        <div id="recipe" class="recipe"></div>
    </div>

    <script>
        const LEGO_PARTS = {
            "2x4_brick": { id: "3001", name: "Brick 2x4", color: "Red", size: "2x4", colorClass: "red" },
            "2x3_brick": { id: "3002", name: "Brick 2x3", color: "Blue", size: "2x3", colorClass: "blue" },
            "2x2_brick": { id: "3003", name: "Brick 2x2", color: "Yellow", size: "2x2", colorClass: "yellow" },
            "1x4_brick": { id: "3010", name: "Brick 1x4", color: "White", size: "1x4", colorClass: "white" },
            "1x2_brick": { id: "3004", name: "Brick 1x2", color: "Black", size: "1x2", colorClass: "black" },
            "1x1_brick": { id: "3005", name: "Brick 1x1", color: "Various", size: "1x1", colorClass: "gray" },
            "2x4_plate": { id: "3020", name: "Plate 2x4", color: "Gray", size: "2x4", colorClass: "gray" },
            "2x2_plate": { id: "3022", name: "Plate 2x2", color: "Gray", size: "2x2", colorClass: "gray" },
            "1x4_plate": { id: "3710", name: "Plate 1x4", color: "Gray", size: "1x4", colorClass: "gray" },
            "1x2_plate": { id: "3023", name: "Plate 1x2", color: "Gray", size: "1x2", colorClass: "gray" },
            "1x1_plate": { id: "3024", name: "Plate 1x1", color: "Gray", size: "1x1", colorClass: "gray" },
            "2x4_slope": { id: "3040", name: "Slope 45° 2x4", color: "Red", size: "slope", colorClass: "red" },
            "2x2_slope": { id: "3039", name: "Slope 45° 2x2", color: "Red", size: "2x2", colorClass: "red" },
            "1x1_round": { id: "4073", name: "Round Brick 1x1", color: "White", size: "round", colorClass: "white" },
            "2x2_round": { id: "4032", name: "Round Plate 2x2", color: "Yellow", size: "2x2", colorClass: "yellow" },
            "axle_4": { id: "3708", name: "Axle 4L", color: "Black", size: "1x4", colorClass: "black" },
            "trans_clear": { id: "3024", name: "Plate 1x1 Trans-Clear", color: "Trans-Clear", size: "1x1", colorClass: "trans" },
            "door_1x3": { id: "4865", name: "Door 1x3x4", color: "White", size: "1x4", colorClass: "white" },
            "window_1x2": { id: "60592", name: "Window 1x2x3", color: "Trans-Clear", size: "1x2", colorClass: "trans" },
            "lever": { id: "4595", name: "Lever", color: "Red", size: "1x2", colorClass: "red" },
            "knob": { id: "3941", name: "Cone 1x1", color: "Red", size: "1x1", colorClass: "red" },
            "cylinder_2x2": { id: "3942", name: "Cylinder 2x2", color: "Various", size: "cylinder", colorClass: "yellow" }
        };

        const RECIPES = {
            "candy machine": {
                title: "Candy Vending Machine",
                set_number: "10642-1",
                parts: [
                    { part: "2x4_brick", qty: 12, step: 1 }, { part: "2x2_brick", qty: 8, step: 1 },
                    { part: "2x4_plate", qty: 6, step: 2 }, { part: "2x2_plate", qty: 4, step: 2 },
                    { part: "1x4_brick", qty: 6, step: 3 }, { part: "1x2_brick", qty: 8, step: 3 },
                    { part: "1x1_brick", qty: 4, step: 4 }, { part: "2x4_slope", qty: 2, step: 5 },
                    { part: "1x1_round", qty: 6, step: 6 }, { part: "lever", qty: 1, step: 7 },
                    { part: "knob", qty: 4, step: 7 }, { part: "trans_clear", qty: 2, step: 8 },
                    { part: "cylinder_2x2", qty: 3, step: 9 }
                ],
                steps: [
                    "Build the base structure using 2x4 bricks in red. Create a 6-stud wide by 4-stud deep foundation.",
                    "Add the first plate layer in gray. This forms the dispensing chamber floor.",
                    "Construct the front panel with 1x4 white bricks. Leave a 2-stud gap in the center for the dispenser.",
                    "Place 1x1 bricks at each corner for structural support. These will hold the transparent front.",
                    "Add the roof slopes in red, angled toward the front. This creates the classic vending machine top.",
                    "Insert 1x1 round bricks (white) as candy pieces inside the machine. Arrange in 3 columns.",
                    "Attach the lever mechanism on the right side. Use one red lever and 4 red knobs for the coin slot.",
                    "Install the transparent 1x1 plates as the viewing window to see the candy selection.",
                    "Add 3 cylinder 2x2 pieces as the dispensing chutes. Test the lever to ensure candy drops!"
                ]
            },
            "house": {
                title: "Classic LEGO House",
                set_number: "10643-1",
                parts: [
                    { part: "2x4_brick", qty: 16, step: 1 }, { part: "2x2_brick", qty: 4, step: 1 },
                    { part: "2x4_plate", qty: 8, step: 2 }, { part: "1x4_brick", qty: 4, step: 3 },
                    { part: "door_1x3", qty: 1, step: 4 }, { part: "window_1x2", qty: 2, step: 5 },
                    { part: "2x4_slope", qty: 4, step: 6 }, { part: "2x2_slope", qty: 2, step: 6 }
                ],
                steps: [
                    "Build the foundation with 2x4 red bricks. Create a 8x6 stud base.",
                    "Add gray plates for the floor. Two layers for stability.",
                    "Build the walls using 1x4 white bricks. Stack 4 bricks high.",
                    "Install the white door in the center front. Ensure it opens outward.",
                    "Add two windows on either side of the door. Use trans-clear pieces.",
                    "Place red slopes for the roof. Angle them to meet at the peak."
                ]
            },
            "car": {
                title: "Simple LEGO Car",
                set_number: "10644-1",
                parts: [
                    { part: "2x4_plate", qty: 1, step: 1 }, { part: "2x2_plate", qty: 2, step: 1 },
                    { part: "2x4_brick", qty: 2, step: 2 }, { part: "2x2_brick", qty: 1, step: 2 },
                    { part: "1x1_round", qty: 4, step: 3 }, { part: "axle_4", qty: 2, step: 3 },
                    { part: "2x2_slope", qty: 2, step: 4 }
                ],
                steps: [
                    "Start with the chassis: one 2x4 gray plate with two 2x2 plates for wheel wells.",
                    "Build the body using 2x4 bricks (red) and a 2x2 brick (blue) for the cabin.",
                    "Attach axles and 1x1 round bricks as wheels. Four wheels total.",
                    "Add 2x2 slopes at the front for the hood. Your car is ready to roll!"
                ]
            }
        };

        function getAggregatedParts(recipe) {
            const count = {};
            recipe.parts.forEach(p => {
                count[p.part] = (count[p.part] || 0) + p.qty;
            });
            return count;
        }

        function findRecipe(buildIdea) {
            const idea = buildIdea.toLowerCase().trim();
            for (const [key, recipe] of Object.entries(RECIPES)) {
                if (idea.includes(key) || key.includes(idea)) return { key, recipe };
            }
            return { key: null, recipe: null };
        }

        function renderRecipe(recipe, buildName) {
            const partsAgg = getAggregatedParts(recipe);
            const partsSorted = Object.entries(partsAgg).sort((a, b) => b[1] - a[1]);

            let html = `
                <div class="recipe-header">
                    <h2>${recipe.title}</h2>
                    <div class="set-num">Set ${recipe.set_number} · ${buildName}</div>
                </div>
                <div class="recipe-body">
                    <div class="parts-section">
                        <div class="section-title">Parts List</div>
                        <div class="parts-list">
            `;

            partsSorted.forEach(([partKey, qty]) => {
                const p = LEGO_PARTS[partKey] || { id: "????", name: partKey.replace(/_/g, " "), color: "—" };
                html += `<div class="part-row">
                    <span class="part-id">${p.id}</span>
                    <span class="part-name">${p.name}</span>
                    <span class="part-qty">×${qty}</span>
                    <span class="part-color">(${p.color})</span>
                </div>`;
            });

            html += `
                        </div>
                    </div>
                    <div class="section-title">Assembly Instructions</div>
                    <div class="step-view" data-recipe-id="${buildName.replace(/\s/g,'-')}">
                        <div class="step-nav">
                            <div class="step-nav-left">
                                <button class="step-nav-btn" id="stepPrev" disabled>← Previous</button>
                                <span class="step-indicator">Step <span id="stepCurrent">1</span> of <span id="stepTotal">${recipe.steps.length}</span></span>
                                <button class="step-nav-btn" id="stepNext">Next →</button>
                            </div>
                            <button class="play-build-btn" id="playBuildBtn" title="Watch step animate">
                                <span class="play-icon">▶</span> Play
                            </button>
                        </div>
                        <div class="build-preview">
                            <div class="bricks-container" id="bricksContainer"></div>
                        </div>
                        <div id="stepContent"></div>
                    </div>
                    <div class="build-complete" id="buildComplete" style="display:none;">Build complete</div>
                </div>
            `;

            return { html, recipe };
        }

        function createBrickEl(p, animate = false) {
            const info = LEGO_PARTS[p.part] || { size: "1x1", colorClass: "gray" };
            const sizeClass = "brick-" + (info.size || "1x1");
            const colorClass = "brick-" + (info.colorClass || "gray");
            const studs = info.size === "round" || info.size === "cylinder" ? 0 : 
                (info.size === "2x4" || info.size === "slope" ? 8 : info.size === "2x3" ? 6 : 
                info.size === "2x2" ? 4 : info.size === "1x4" ? 4 : info.size === "1x2" ? 2 : 1);
            let studHtml = "";
            if (studs > 0) {
                studHtml = '<div class="studs">';
                for (let s = 0; s < studs; s++) studHtml += '<span class="stud"></span>';
                studHtml += '</div>';
            }
            const div = document.createElement("div");
            div.className = `brick ${sizeClass} ${colorClass}` + (animate ? " animating" : "");
            div.innerHTML = studHtml;
            return div;
        }

        function renderBricks(parts, animate = false) {
            const bricks = [];
            parts.forEach(p => {
                for (let i = 0; i < p.qty; i++) {
                    bricks.push(createBrickEl(p, animate));
                }
            });
            return bricks;
        }

        function showStep(recipe, stepIndex) {
            const steps = recipe.steps.map((stepText, i) => {
                const stepNum = i + 1;
                const stepParts = recipe.parts.filter(p => p.step === stepNum);
                const partsStr = stepParts.map(p => p.qty + "× " + (LEGO_PARTS[p.part]?.name || p.part)).join(", ");
                return { stepNum, stepParts, partsStr, stepText };
            });
            const step = steps[stepIndex];
            const totalSteps = steps.length;
            const cumulativeParts = [];
            for (let i = 0; i <= stepIndex; i++) {
                steps[i].stepParts.forEach(p => cumulativeParts.push(p));
            }
            document.getElementById("stepCurrent").textContent = stepIndex + 1;
            document.getElementById("stepTotal").textContent = totalSteps;
            const totalBricks = cumulativeParts.reduce((s, p) => s + p.qty, 0);
            const container = document.getElementById("bricksContainer");
            container.innerHTML = "";
            renderBricks(cumulativeParts).forEach(el => {
                el.classList.add("appear");
                container.appendChild(el);
            });
            container.classList.toggle("many-bricks", totalBricks > 20);
            document.getElementById("stepContent").innerHTML = `
                <div class="step">
                    <div class="step-num">STEP ${step.stepNum}</div>
                    ${step.partsStr ? `<div class="step-parts">Parts needed: ${step.partsStr}</div>` : ""}
                    <div class="step-text">${step.stepText}</div>
                </div>
            `;
            document.getElementById("stepPrev").disabled = stepIndex === 0;
            document.getElementById("stepNext").disabled = stepIndex === totalSteps - 1;
            document.getElementById("stepNext").textContent = stepIndex === totalSteps - 1 ? "Done" : "Next →";
            document.getElementById("buildComplete").style.display = stepIndex === totalSteps - 1 ? "block" : "none";
        }

        function playBuildAnimation(recipe, stepIndex) {
            const steps = recipe.steps.map((_, i) => recipe.parts.filter(p => p.step === i + 1));
            const cumulativeParts = [];
            for (let i = 0; i <= stepIndex; i++) steps[i].forEach(p => cumulativeParts.push(p));
            const brickEls = renderBricks(cumulativeParts);
            const container = document.getElementById("bricksContainer");
            const playBtn = document.getElementById("playBuildBtn");
            container.innerHTML = "";
            container.classList.toggle("many-bricks", brickEls.length > 20);
            playBtn.disabled = true;
            playBtn.classList.add("playing");
            playBtn.innerHTML = '<span class="play-icon">●</span> Building';
            let i = 0;
            function addNext() {
                if (i >= brickEls.length) {
                    playBtn.disabled = false;
                    playBtn.classList.remove("playing");
                    playBtn.innerHTML = '<span class="play-icon">▶</span> Play';
                    return;
                }
                const el = brickEls[i];
                el.classList.add("animating");
                container.appendChild(el);
                i++;
                setTimeout(addNext, 55);
            }
            addNext();
        }

        function initStepView(recipe) {
            let currentStep = 0;
            showStep(recipe, 0);
            document.getElementById("stepPrev").onclick = () => { currentStep--; showStep(recipe, currentStep); };
            document.getElementById("stepNext").onclick = () => {
                if (currentStep < recipe.steps.length - 1) { currentStep++; showStep(recipe, currentStep); }
            };
            document.getElementById("playBuildBtn").onclick = () => playBuildAnimation(recipe, currentStep);
        }

        function generate() {
            const input = document.getElementById("buildInput");
            const buildIdea = input.value.trim();
            const recipeEl = document.getElementById("recipe");

            if (!buildIdea) {
                recipeEl.classList.remove("visible");
                return;
            }

            let { key, recipe } = findRecipe(buildIdea);

            if (!recipe) {
                recipe = JSON.parse(JSON.stringify(RECIPES["candy machine"]));
                recipe.title = "Custom: " + buildIdea.charAt(0).toUpperCase() + buildIdea.slice(1);
                recipe.set_number = "CUSTOM-1";
            }

            const { html } = renderRecipe(recipe, buildIdea);
            recipeEl.innerHTML = html + (!key ? '<p class="no-match">No exact match found. Showing Candy Machine template. Try "candy machine", "house", or "car" for full recipes.</p>' : "");

            initStepView(recipe);
            recipeEl.classList.add("visible");
            recipeEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        document.getElementById("buildBtn").addEventListener("click", generate);
        document.getElementById("buildInput").addEventListener("keydown", e => { if (e.key === "Enter") generate(); });
        document.querySelectorAll(".suggestions button").forEach(btn => {
            btn.addEventListener("click", () => {
                document.getElementById("buildInput").value = btn.dataset.build;
                generate();
            });
        });
    </script>
</body>
</html>
